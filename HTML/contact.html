<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loving Homes</title>
  <link rel="stylesheet" href="../CSS/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container nav-wrap">
      <a class="brand-logo" href="index.html">
        <img src="../Images/logo.svg" alt="Loving Homes logo">
      </a>
      <a class="brand-name" href="index.html">Loving Homes</a>
      <button class="menu-toggle" type="button" aria-label="Open menu">Menu</button>
      <nav class="site-nav">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="services.html">Services</a>
        <a href="packages.html">Packages</a>
        <a href="#">Gallery</a>
        <a href="contact.html" class="active">Contact</a>
      </nav>
      <form class="site-search" id="siteSearch" role="search">
        <label class="sr-only" for="siteSearchInput">Search the site</label>
        <input id="siteSearchInput" name="q" type="search" placeholder="Search pages or services">
        <button class="btn btn-secondary site-search-button" type="submit">Search</button>
        <p class="search-status" aria-live="polite"></p>
      </form>
    </div>
  </header>
  <main class="page-main">
    <section class="page-banner">
      <div class="container">
        <p class="eyebrow">Contact Us</p>
        <h1>Send us a message if you want to ask anything.</h1>
      </div>
    </section>
    <section class="section">
      <div class="container contact-grid">
        <form id="contactForm" class="contact-form" novalidate>
          <h2>Send a message</h2>
          <div class="form-row">
            <label for="name">Your Name</label>
            <input type="text" id="name" name="name" required>
            <small class="error-message"></small>
          </div>
          <div class="form-row">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
            <small class="error-message"></small>
          </div>
          <div class="form-row">
            <label for="phone">Phone</label>
            <input type="tel" id="phone" name="phone" required>
            <small class="error-message"></small>
          </div>
          <div class="form-row">
            <label for="petName">Pet Name</label>
            <input type="text" id="petName" name="petName" required>
            <small class="error-message"></small>
          </div>
          <div class="form-row">
            <label for="package">Preferred Package</label>
            <select id="package" name="package" required>
              <option value="">Select a package</option>
              <option value="premium">Premium</option>
              <option value="classic">Classic</option>
              <option value="daycare">Day Care</option>
              <option value="custom">Custom Long Stay</option>
            </select>
            <small class="error-message"></small>
          </div>
          <div class="form-row">
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="5" required></textarea>
            <small class="error-message"></small>
          </div>
          <button class="btn btn-primary" type="submit">Send Message</button>
          <p id="formStatus" class="form-status" aria-live="polite"></p>
        </form>
      </div>
    </section>
  </main>
  <footer class="site-footer">
    <div class="container footer-grid">
      <div class="footer-contact">
        <p>Email: lovinghomes@gmail.com</p>
        <p>Phone: +852 98291028</p>
      </div>
      <div class="footer-social">
        <a href="https://facebook.com/loving_homes" target="_blank">Facebook</a>
        <a href="https://instagram.com/loving_homes" target="_blank">Instagram</a>
        <a href="https://twitter.com/loving_homes" target="_blank">Twitter</a>
      </div>
    </div>
  </footer>
  <script src="../JS/main.js"></script>
</body>
</html>
