<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loving Homes</title>
  <link rel="stylesheet" href="../CSS/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container nav-wrap">
      <a class="brand-logo" href="index.html">
        <img src="../Images/logo.svg" alt="Loving Homes logo">
      </a>
      <a class="brand-name" href="index.html">Loving Homes</a>
      <button class="menu-toggle" type="button" aria-label="Open menu">Menu</button>
      <nav class="site-nav">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="services.html">Services</a>
        <a href="packages.html">Packages</a>
        <a href="#" class="active">Gallery</a>
        <a href="contact.html">Contact</a>
      </nav>
      <form class="site-search" id="siteSearch" role="search">
        <label class="sr-only" for="siteSearchInput">Search the site</label>
        <input id="siteSearchInput" name="q" type="search" placeholder="Search pages or services">
        <button class="btn btn-secondary site-search-button" type="submit">Search</button>
        <p class="search-status" aria-live="polite"></p>
      </form>
    </div>
  </header>
  <main class="page-main">
    <section class="page-banner">
      <div class="container">
        <p class="eyebrow">Gallery</p>
        <h1>Some pictures from our dog hotel.</h1>
      </div>
    </section>
    <section class="section">
      <div class="container gallery-grid">
        <img src="../Images/gallery1.jpg" alt="Dog resting in a clean room">
        <img src="../Images/gallery2.jpg" alt="Dog playing with a ball indoors">
        <img src="../Images/gallery3.jpg" alt="Staff member greeting a small dog">
        <img src="../Images/gallery4.jpg" alt="Comfortable hotel room prepared for a guest dog">
      </div>
    </section>
  </main>
  <footer class="site-footer">
    <div class="container footer-grid">
      <div class="footer-contact">
        <p>Email: lovinghomes@gmail.com</p>
        <p>Phone: +852 98291028</p>
      </div>
      <div class="footer-social">
        <a href="https://facebook.com/loving_homes" target="_blank">Facebook</a>
        <a href="https://instagram.com/loving_homes" target="_blank">Instagram</a>
        <a href="https://twitter.com/loving_homes" target="_blank">Twitter</a>
      </div>
    </div>
  </footer>
  <script src="../JS/main.js"></script>
</body>
</html>
